version: "3.9"

services:
  db:
    image: mysql:8.0
    container_name: interest_api_mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: interest_db
      MYSQL_USER: user
      MYSQL_PASSWORD: userpass
    ports:
      - "3306:3306"
    volumes:
      - ./dbinit:/docker-entrypoint-initdb.d # 初期スキーマとデータを自動投入

  web:
    build: .
    container_name: interest_api_web
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      - db
    volumes:
      - ./app:/app
